<!DOCTYPE html>
<html lang="en">

<head>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GP Chapra Chatbot</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="chat-widget">

<header>

<header>



<h2>Government Polytechnic Chapra Chatbot</h2>

</header>

<div class="header-buttons">

<button id="new-chat">🧹 New Chat</button>

</div>

</header>

<div id="chat-box" class="chat-box"></div>


<div class="quick-questions">

<button class="q-btn">College Detail</button>
<button class="q-btn">Courses Offered</button>
<button class="q-btn">Admission Process</button>
<button class="q-btn">Hostel Facility</button>
<button class="q-btn">Fees Structure</button>
<button class="q-btn">Campus Location</button>
<button class="q-btn">Library Facility</button>
<button class="q-btn">Placement Details</button>
<button class="q-btn">Events</button>
<button class="q-btn">Scholarship</button>
<button class="q-btn">Exam Pattern</button>

</div>

<div class="input-area">

<input type="text" id="user-input" placeholder="Type your question...">

<button id="send-btn">
<i class="fa-solid fa-paper-plane"></i>
</button>

</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
