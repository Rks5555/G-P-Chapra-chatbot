
<!DOCTYPE html>
<html>
<head>
    <title>GP Chapra Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
        }

        .chat-container {
            width: 400px;
            margin: 50px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            padding: 15px;
        }

        h2 {
            text-align: center;
        }

        #chat-box {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
        }

        .user {
            text-align: right;
            color: blue;
            margin: 5px;
        }

        .bot {
            text-align: left;
            color: green;
            margin: 5px;
        }

        input {
            width: 75%;
            padding: 8px;
        }

        button {
            padding: 8px 12px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        .buttons {
            margin-bottom: 10px;
        }

        .buttons button {
            margin: 2px;
            background: #007bff;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <h2>GP Chapra Chatbot</h2>

    <div class="buttons">
        <button onclick="quickMsg('college info')">College Info</button>
        <button onclick="quickMsg('admission process')">Admission</button>
        <button onclick="quickMsg('fees structure')">Fees</button>
        <button onclick="quickMsg('campus location')">Location</button>
        <button onclick="quickMsg('exam pattern')">Exam</button>
    </div>

    <div id="chat-box"></div>

    <input type="text" id="msg" placeholder="Type your message...">
    <button onclick="sendMsg()">Send</button>
</div>

<script>
function appendMessage(sender, text) {
    let chatBox = document.getElementById("chat-box");
    let msgDiv = document.createElement("div");
    msgDiv.className = sender;
    msgDiv.innerText = text;
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMsg() {
    let message = document.getElementById("msg").value;

    appendMessage("user", message);

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {
        appendMessage("bot", data.reply);
    });

    document.getElementById("msg").value = "";
}

function quickMsg(text) {
    document.getElementById("msg").value = text;
    sendMsg();
}
</script>

</body>
</html>
