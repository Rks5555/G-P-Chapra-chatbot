<!DOCTYPE html>
<html>
<head>
    <title>GP Chapra Chatbot</title>

    <!-- MOBILE RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #e5ddd5;
        }

        /* FULL SCREEN CONTAINER */
        .chat-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            background: #075e54;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }

        /* CHAT AREA */
        #chat-box {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        /* USER MESSAGE */
        .user {
            background: #dcf8c6;
            padding: 10px;
            border-radius: 10px;
            margin: 5px;
            max-width: 75%;
            align-self: flex-end;
        }

        /* BOT MESSAGE */
        .bot {
            background: white;
            padding: 10px;
            border-radius: 10px;
            margin: 5px;
            max-width: 75%;
            align-self: flex-start;
        }

        /* BUTTONS */
        .buttons {
            display: flex;
            overflow-x: auto;
            padding: 5px;
            background: #f0f0f0;
        }

        .buttons button {
            margin-right: 5px;
            border: none;
            border-radius: 20px;
            padding: 6px 12px;
            background: #128c7e;
            color: white;
            cursor: pointer;
            white-space: nowrap;
        }

        /* INPUT AREA */
        .input-area {
            display: flex;
            padding: 8px;
            background: white;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
        }

        .send-btn {
            margin-left: 5px;
            border: none;
            border-radius: 50%;
            background: #128c7e;
            color: white;
            width: 40px;
        }
    </style>
</head>

<body>

<div class="chat-container">

    <div class="header">GP Chapra Chatbot</div>

    <div id="chat-box"></div>

    <!-- BUTTONS -->
    <div class="buttons">
        <button onclick="quickMsg('college info')">College Info</button>
        <button onclick="quickMsg('admission process')">Admission</button>
        <button onclick="quickMsg('fees structure')">Fees</button>
        <button onclick="quickMsg('campus location')">Location</button>
        <button onclick="quickMsg('exam pattern')">Exam</button>
        <button onclick="quickMsg('hostel facility')">Hostel</button>
    </div>

    <!-- INPUT -->
    <div class="input-area">
        <input type="text" id="msg" placeholder="Type your message...">
        <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>

</div>

<script>
function appendMessage(sender, text) {
    let chatBox = document.getElementById("chat-box");

    let msgDiv = document.createElement("div");
    msgDiv.className = sender;
    msgDiv.innerText = text;

    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMsg() {
    let message = document.getElementById("msg").value;

    if (message.trim() === "") return;

    appendMessage("user", message);

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {
        appendMessage("bot", data.reply);
    });

    document.getElementById("msg").value = "";
}

function quickMsg(text) {
    document.getElementById("msg").value = text;
    sendMsg();
}
</script>

</body>
</html>
