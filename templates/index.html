<!DOCTYPE html>
<html>
<head>
    <title>GP Chapra Chatbot</title>

    <style>
        body {
            background: #eaeaea;
            font-family: Arial;
        }

        .chat-container {
            width: 380px;
            margin: auto;
            margin-top: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        h2 {
            text-align: center;
            padding: 10px;
        }

        #chat-box {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .user {
            background: #a8d5ba;
            padding: 10px;
            border-radius: 15px;
            margin: 5px;
            align-self: flex-end;
            max-width: 70%;
        }

        .bot {
            background: #eee;
            padding: 10px;
            border-radius: 15px;
            margin: 5px;
            align-self: flex-start;
            max-width: 70%;
        }

        .buttons {
            display: flex;
            overflow-x: auto;
            padding: 5px;
            gap: 5px;
        }

        .buttons button {
            background: #5c5ce0;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 12px;
            cursor: pointer;
            white-space: nowrap;
        }

        .input-area {
            display: flex;
            padding: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
        }

        .send-btn {
            background: #5c5ce0;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            margin-left: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="chat-container">

    <h2>GP Chapra Chatbot</h2>

    <div id="chat-box"></div>

    <!-- 🔽 BUTTONS BOTTOM -->
    <div class="buttons">
        <button onclick="quickMsg('college info')">College Info</button>
        <button onclick="quickMsg('admission process')">Admission</button>
        <button onclick="quickMsg('fees structure')">Fees</button>
        <button onclick="quickMsg('campus location')">Location</button>
        <button onclick="quickMsg('exam pattern')">Exam</button>
        <button onclick="quickMsg('hostel facility')">Hostel</button>
    </div>

    <!-- 🔽 INPUT AREA -->
    <div class="input-area">
        <input type="text" id="msg" placeholder="Type your question...">
        <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>

</div>

<script>
function appendMessage(sender, text) {
    let chatBox = document.getElementById("chat-box");

    let msgDiv = document.createElement("div");
    msgDiv.className = sender;
    msgDiv.innerText = text;

    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMsg() {
    let message = document.getElementById("msg").value;

    if (message.trim() === "") return;

    appendMessage("user", message);

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {
        appendMessage("bot", data.reply);
    });

    document.getElementById("msg").value = "";
}

function quickMsg(text) {
    document.getElementById("msg").value = text;
    sendMsg();
}
</script>

</body>
</html>
